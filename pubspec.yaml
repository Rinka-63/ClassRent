name: classrent
description: ClassRent smart room booking Flutter foundation.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  dio: ^5.4.3+1
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  fpdart: ^1.1.0
  go_router: ^14.2.0
  intl: ^0.19.0
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
